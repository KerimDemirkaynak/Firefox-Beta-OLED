name: Build Firefox Beta OLED Theme (Auto-Release)

on:
  schedule:
    - cron: '00 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release info from this repo
        id: this_repo_latest_release
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          latest: true
          doNotFailIfNotFound: true

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget apktool zipalign apksigner jq openjdk-17-jdk
          
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Get Latest Firefox Beta Release (Upstream)
        id: get_upstream_release
        run: |
          FENIX_VERSION=$(curl -s https://ftp.mozilla.org/pub/fenix/releases/ | grep -oE '[0-9]+\.[0-9]+b[0-9]+' | sort -V | tail -n 1)
          
          LATEST_RELEASE="https://ftp.mozilla.org/pub/fenix/releases/${FENIX_VERSION}/android/fenix-${FENIX_VERSION}-android-arm64-v8a/fenix-${FENIX_VERSION}-android-arm64-v8a.apk"
          
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "FENIX_VERSION=$FENIX_VERSION" >> $GITHUB_OUTPUT
          echo "Current upstream Firefox Beta version: $FENIX_VERSION"

      - name: Check if new version is available
        id: version_check
        run: |
          UPSTREAM_VERSION="${{ steps.get_upstream_release.outputs.FENIX_VERSION }}"
          THIS_REPO_VERSION="${{ steps.this_repo_latest_release.outputs.tag_name }}"

          echo "Upstream Firefox Beta version: $UPSTREAM_VERSION"
          echo "This repository's latest release version: ${THIS_REPO_VERSION:-"No previous release found."}"

          if [ "$UPSTREAM_VERSION" != "$THIS_REPO_VERSION" ]; then
            echo "::set-output name=NEW_VERSION_AVAILABLE::true"
            echo "New version available! Building and releasing."
          else
            echo "::set-output name=NEW_VERSION_AVAILABLE::false"
            echo "No new version from upstream. Skipping build and release."
          fi
      
      - name: Download Latest APK
        if: steps.version_check.outputs.NEW_VERSION_AVAILABLE == 'true'
        run: |
          wget -q "${{ steps.get_upstream_release.outputs.LATEST_RELEASE }}" -O fenix.apk
          
      - name: Run Build Script
        if: steps.version_check.outputs.NEW_VERSION_AVAILABLE == 'true'
        run: bash build.sh
        
      - name: Sign APK
        if: steps.version_check.outputs.NEW_VERSION_AVAILABLE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -di > keystore.jks
          apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSPHRASE }} --key-pass pass:${{ secrets.KEY_PASSWORD }} fenix-patched-signed.apk
          
      - name: Upload APK as Artifact
        if: steps.version_check.outputs.NEW_VERSION_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firefox-beta-oled-apk
          path: fenix-patched-signed.apk

      - name: Create Release
        id: create_release
        if: steps.version_check.outputs.NEW_VERSION_AVAILABLE == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_upstream_release.outputs.FENIX_VERSION }}
          name: Firefox Beta OLED Theme ${{ steps.get_upstream_release.outputs.FENIX_VERSION }}
          body: |
            Automatic release of Firefox Beta OLED Theme based on upstream version ${{ steps.get_upstream_release.outputs.FENIX_VERSION }}.
            
            This APK is automatically built and patched for an AMOLED dark theme.
          files: fenix-patched-signed.apk
